            color: var(--dark);

            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--primary);
            margin-left: 1rem;
            flex-shrink: 0;

            display: none;

            animation: slideIn 0.3s ease;

            border-radius: 8px;
            perspective: 1000px;
            margin-bottom: 1rem;
            cursor: pointer;
            min-height: 120px;

            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;

            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }

        .flip-card-back {
            background-color: var(--primary-light);
            color: var(--dark);
            transform: rotateY(180deg);
            font-size: 0.95rem;
            line-height: 1.5;

            gap: 1rem;
            margin-bottom: 1rem;

            background-color: white;
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }

        .summary-item-title {
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .summary-item-content {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text);
        }

            background-color: white;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .mcq-stem {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .mcq-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .mcq-option {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: white;
            color: var(--text);
            font-size: 0.95rem;
        }

        .mcq-option:hover {
            background-color: var(--primary-light);
            border-color: var(--primary);
        }

        .mcq-option.selected {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            font-weight: 600;
        }

        .mcq-reveal-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .mcq-reveal-btn:hover {
            background-color: var(--primary-dark);
        }

        .mcq-explanation {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background-color: rgba(16,185,129,0.05);
            border-left: 4px solid var(--success);
            border-radius: 6px;
        }

        .mcq-explanation.show {

        }

        .explanation-title {
            font-weight: 700;
            color: var(--success);
            margin-bottom: 0.5rem;
        }

        .explanation-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text);
        }

        .diagram {
            background-color: var(--bg);
            border: 1px solid var(--border);

            font-size: 0.85rem;
            overflow-x: auto;
            line-height: 1.4;

        .mnemonic {
            background: linear-gradient(135deg, #fef08a, #fcd34d);
            border-left: 4px solid #f59e0b;
            border-radius: 6px;
            padding: 1rem;
            margin: 1rem 0;
            font-weight: 600;
            color: #78350f;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 180px;
                font-size: 0.8rem;
            }

            .main {
                margin-left: 180px;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-text h1 {
                font-size: 1.5rem;
            }

            .content {
                padding: 1rem;
            }

            .lo-section {
                padding: 1.5rem;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        /* ===== PRINT ===== */
        @media print {
            .sidebar {
                display: none;
            }

            .main {
                margin-left: 0;
            }

            .header {
                page-break-after: avoid;
            }

            .lo-section {
                page-break-inside: avoid;
            }
        }
    </style>
</head>

                    <h4>Hypothalamic Control: Dual Regulation</h4>

                    </ul>

                    <h3>Bone Age Assessment (Greulich-Pyle Method)</h3>
                    <p><strong>Bone age:</strong> Radiologic maturity of the skeleton (not same as chronological age)</p>

                    <h4>Method</h4>
                    <ul>
                        <li><strong>Radiograph:</strong> Left hand/wrist (PA view) — shows all hand bones and wrist cartilage/ossification</li>
                        <li><strong>Comparison:</strong> Atlas comparison (Greulich-Pyle or Tanner-Whitehouse method)</li>
                        <li>Assess carpal bones, metacarpals, phalanges, epiphyses, growth plates</li>
                    </ul>

                    <h4>Interpretation: Bone Age vs. Chronological Age</h4>
                    <table>
                        <thead>
                            <tr>
                                <th>Bone Age vs. Chron. Age</th>
                                <th>Differential Diagnosis</th>
                                <th>IGF-1 / GH Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>Bone age = Chron. age</strong> (normal)</td>
                                <td>• Familial short stature<br/>• Growth hormone sufficient<br/>• Normal development</td>
                                <td>Normal IGF-1, normal GH response</td>
                            </tr>
                            <tr>
                                <td><strong>Bone age &lt; Chron. age</strong> (delayed)</td>
                                <td>• GH deficiency<br/>• Hypothyroidism<br/>• Constitutional growth delay<br/>• Malnutrition<br/>• Chronic disease</td>
                                <td>LOW IGF-1 (GH def), or normal IGF-1 (const. delay)</td>
                            </tr>
                            <tr>
                                <td><strong>Bone age &gt; Chron. age</strong> (advanced)</td>
                                <td>• Precocious puberty (sex hormone excess)<br/>• Congenital adrenal hyperplasia<br/>• Thyrotoxicosis<br/>• Obesity (mild)</td>
                                <td>↑ Sex steroids or ↑ thyroid hormone</td>
                            </tr>
                        </tbody>
                    </table>

                    <h3>Differential Diagnosis of Short Stature</h3>

                    <h4>Familial Short Stature (Most Common Non-Pathological)</h4>
                    <ul>
                        <li><strong>Definition:</strong> Short height inherited from short parents; no pathology</li>
                        <li><strong>Features:</strong>
                            <ul>
                                <li>Bone age = chronological age (normal skeletal development)</li>
                                <li><strong>Normal growth velocity</strong> (tracks curve proportionally)</li>
                                <li>Normal IGF-1 (for age)</li>
                                <li>Normal GH response to stimulation</li>
                                <li><strong>Final adult height = mid-parental height</strong> (±2 inches)</li>
                                <li>Family history of short stature</li>
                            </ul>
                        </li>
                    </ul>

                    <h4>Constitutional Growth Delay (Common in Boys)</h4>
                    <ul>
                        <li><strong>Definition:</strong> Normal variant; delayed puberty + delayed linear growth; eventual normal adult height</li>
                        <li><strong>Features:</strong>
                            <ul>
                                <li><strong>Bone age &lt; chronological age</strong> (delayed)</li>
                                <li><strong>Normal growth velocity</strong> (appropriate for bone age)</li>
                                <li>Normal IGF-1 (for bone age)</li>
                                <li>Normal GH response to stimulation</li>
                                <li><strong>Delayed puberty</strong> (later than peers)</li>
                                <li>Final adult height = expected/normal (catches up after pubertal growth spurt)</li>
                                <li>Family history of delayed puberty common (father delayed puberty)</li>
                            </ul>
                        </li>
                        <li><strong>Reassurance/support:</strong> Growth will catch up; normality expected</li>
                    </ul>

                    <h4>GH Deficiency (Pathological)</h4>
                    <ul>
                        <li><strong>Features:</strong>
                            <ul>
                                <li><strong>Bone age &lt; chronological age</strong> (delayed)</li>
                                <li><strong>Decreased growth velocity</strong> (critical sign)</li>
                                <li><strong>Low IGF-1</strong> (age-adjusted)</li>
                                <li><strong>Blunted GH response on stimulation</strong> (peak <5–10 ng/mL)</li>
                                <li>May have other signs of hypopituitarism (hypothyroidism, hypogonadism, hypocortisolism)</li>
                                <li>Predicts adult height < mid-parental height</li>
                            </ul>
                        </li>
                    </ul>

                    <h4>Other Pathological Causes</h4>
                    <ul>
                        <li><strong>Hypothyroidism:</strong> Delayed bone age, ↓ growth velocity, low T4/elevated TSH</li>
                        <li><strong>Turner syndrome (XO):</strong> Girls with short stature, bone age may be delayed or normal, elevated FSH, low estrogen</li>
                        <li><strong>Chronic systemic disease:</strong> Cystic fibrosis, inflammatory bowel disease, celiac disease, chronic kidney disease
                            <ul>
                                <li>Malabsorption, chronic inflammation → impaired growth</li>
                            </ul>
                        </li>
                        <li><strong>Cushing's syndrome:</strong> Glucocorticoid excess → ↓ GH, ↓ growth velocity</li>
                        <li><strong>Skeletal dysplasias:</strong> Genetic bone disorders (achondroplasia, etc.) → characteristic proportions</li>
                        <li><strong>Psychosocial deprivation / abuse:</strong> Stress-induced GH suppression; reversible with improved environment</li>
                        <li><strong>Nutritional deficiency:</strong> Malnutrition, protein deficiency</li>
                    </ul>

                    <h3>Mid-Parental Height Prediction</h3>
                    <p><strong>Used to assess if child's height is consistent with genetic potential.</strong></p>

                    <h4>Calculation</h4>
                    <ul>
                        <li><strong>Boys:</strong> (Father's height + Mother's height + 5 inches) / 2 ± 2 inches</li>
                        <li><strong>Girls:</strong> (Father's height + Mother's height - 5 inches) / 2 ± 2 inches</li>
                    </ul>

                    <h4>Interpretation</h4>
                    <ul>
                        <li>Child's current height and predicted adult height should track toward mid-parental height</li>
                        <li>If height &lt; (mid-parental height - 2 SD), investigate pathology</li>
                    </ul>

                    <h3>Clinical Approach to Short Stature</h3>

                    <h4>History</h4>
                    <ul>
                        <li><strong>Birth size:</strong> Normal in GH deficiency; small in intrauterine growth restriction</li>
                        <li><strong>Growth pattern:</strong> Age of onset; progressive decline in growth velocity?</li>
                        <li><strong>Nutrition:</strong> Adequate calorie/protein intake? Feeding difficulty?</li>
                        <li><strong>Systemic symptoms:</strong> Chronic cough (CF), diarrhea (IBD, celiac), fatigue, polydipsia (diabetes)</li>
                        <li><strong>Family history:</strong> Parental heights, family hx of short stature, delayed puberty, genetic disorders</li>
                        <li><strong>Medications:</strong> Chronic corticosteroids, stimulant medications</li>
                        <li><strong>Psychosocial:</strong> Stress, deprivation, abuse history</li>
                    </ul>

                    <h4>Physical Examination</h4>
                    <ul>
                        <li><strong>Height, weight, head circumference:</strong> Plot on standardized growth chart</li>
                        <li><strong>Growth velocity:</strong> Compare to prior measurements</li>
                        <li><strong>Proportions:</strong> Check limb:trunk ratio (abnormal in skeletal dysplasias)</li>
                        <li><strong>Sexual development:</strong> Tanner stage (assess puberty status)</li>
                        <li><strong>Dysmorphic features:</strong> Syndromic findings, facial features</li>
                        <li><strong>Signs of systemic disease:</strong> Hepatosplenomegaly, digital clubbing, etc.</li>
                    </ul>

                    <h4>Laboratory Evaluation</h4>
                    <ul>
                        <li><strong>Initial screening:</strong>
                            <ul>
                                <li>IGF-1 (GH adequacy)</li>
                                <li>IGFBP-3 (GH dependency)</li>
                                <li>Thyroid function (TSH, free T4)</li>
                                <li>CBC (anemia, infection)</li>
                                <li>BMP (renal function, electrolytes)</li>
                                <li>Tissue transglutaminase (tTG) and total IgA (celiac screening)</li>
                            </ul>
                        </li>
                        <li><strong>Conditional (based on history/exam):</strong>
                            <ul>
                                <li>Karyotype (girls suspected Turner: short stature, webbed neck, cardiac/renal abnormalities)</li>
                                <li>GH stimulation tests (if IGF-1 or IGFBP-3 low)</li>
                                <li>Cortisol, ACTH (if Cushing's suspected)</li>
                            </ul>
                        </li>
                    </ul>

                    <h4>Imaging</h4>
                    <ul>
                        <li><strong>Bone age X-ray (left wrist):</strong> Assess skeletal maturity</li>
                        <li><strong>MRI pituitary:</strong> If GH deficiency confirmed; rule out tumor, structural lesion</li>
                    </ul>

                    <h3>Growth Charts Interpretation</h3>
                    <p><strong>Standard WHO/CDC growth charts:</strong> Percentile curves (3rd, 5th, 10th, 25th, 50th, 75th, 90th, 95th, 97th)</p>
                    <ul>
                        <li><strong>Short stature:</strong> Height &lt;3rd percentile (or &lt;-2 SD from mean)</li>
                        <li><strong>Serial measurements:</strong> Plot multiple timepoints to assess velocity and trajectory
                            <ul>
                                <li>Normal: child "tracks" along a percentile curve</li>
                                <li>Abnormal: acute drop-off or crossing percentiles downward</li>
                            </ul>
                        </li>
                    </ul>

                    <div class="flip-card" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">How do you distinguish GH deficiency from constitutional delay?</div>
                            <div class="flip-card-back">Both have delayed bone age. But GH-deficient kids have LOW IGF-1 and blunted GH response on testing. Constitutional delay: normal IGF-1 and normal GH response.</div>
                        </div>
                    </div>

                    <div class="flip-card" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">What does "growth velocity" tell you?</div>
                            <div class="flip-card-back">The rate of height change over time. Decreased velocity = pathology (GH deficiency, hypothyroidism, malnutrition, chronic disease). A key screening marker.</div>
                        </div>
                    </div>

                    <div class="flip-card" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">Calculate mid-parental height for a boy: Father 5'10", Mother 5'5"</div>
                            <div class="flip-card-back">Boys: (70 + 65 + 5) / 2 = 70 inches = 5'10" ± 2". Target: ~5'8" to 6'.</div>
                        </div>
                    </div>

                    <div class="summary-box">
                        <div class="summary-title">
                            <span>🎯</span> How This LO Is Tested
                        </div>
                        <div class="summary-grid">
                            <div class="summary-item">
                                <div class="summary-item-title">Clinical Vignette</div>
                                <div class="summary-item-content">"8-year-old boy, height tracking below 3rd percentile, bone age 6 years, IGF-1 low" → GH deficiency diagnosis and work-up.</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-item-title">Differential Reasoning</div>
                                <div class="summary-item-content">Given bone age + growth velocity + IGF-1 + family history, differentiate familial vs. constitutional vs. pathological short stature.</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-item-title">Growth Chart Interpretation</div>
                                <div class="summary-item-content">Serial height measurements plot on curve; acute drop-off in percentile = pathology; tracking curve = likely normal variant.</div>
                            </div>
                        </div>
                        <div class="summary-title" style="margin-top: 1rem;">
                            <span>⚠️</span> Common Exam Traps
                        </div>
                        <div class="summary-grid">
                            <div class="summary-item">
                                <div class="summary-item-title">Bone Age = Age</div>
                                <div class="summary-item-content">If bone age = chronological age in a short child, that RULES OUT GH deficiency (which has delayed bone age). Think familial instead.</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-item-title">Growth Velocity Key</div>
                                <div class="summary-item-content">A short child with NORMAL growth velocity tracking a percentile is likely familial/normal variant. DECREASED velocity = red flag for pathology.</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-item-title">Mid-Parental Height</div>
                                <div class="summary-item-content">Always calculate if not provided. Child height should approach mid-parental height. If far below, investigate pathology.</div>
                            </div>
                        </div>
                        <div class="summary-title" style="margin-top: 1rem;">
                            <span>⭐</span> HY Bullet Points
                        </div>
                        <ul style="margin-top: 0.5rem;">
                            <li>Short stature: Height &lt;2 SD below mean (&lt;3rd percentile)</li>
                            <li>Growth velocity: Rate of height change; DECREASED = pathologic</li>
                            <li>Bone age (Greulich-Pyle): Skeletal maturity from left wrist X-ray</li>
                            <li>Bone age = chron. age: Normal growth, familial short stature</li>
                            <li>Bone age &lt; chron. age: Delayed (GH deficiency, hypothyroidism, const. delay, malnutrition)</li>
                            <li>Bone age &gt; chron. age: Advanced (precocious puberty, hyperthyroidism, CAH)</li>
                            <li>Familial short stature: Normal IGF-1, normal GH, bone age = age, family hx, final height = mid-parental</li>
                            <li>Constitutional delay: Delayed bone age, normal IGF-1 + GH, delayed puberty, eventually normal adult height</li>
                            <li>GH deficiency: Low IGF-1, decreased velocity, delayed bone age, blunted GH response, short of predicted adult height</li>
                            <li>Mid-parental height: Boys = (father + mother + 5) / 2 ± 2"; Girls = (father + mother - 5) / 2 ± 2"</li>
                            <li>Diagnostic labs: IGF-1, IGFBP-3, TSH, CBC, BMP, celiac screen, karyotype (if Turner suspected), bone age X-ray</li>
                        </ul>
                    </div>
                `
            }
        ];

        // ===== STATE MANAGEMENT =====
        const STORAGE_KEY = 'endo_lec09';

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : { completedLOs: [], expandedLOs: [] };
        }

        function saveState(state) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function initializeUI() {
            const container = document.getElementById('los-container');
            const sidebarNav = document.getElementById('sidebar-nav');
            let state = loadState();

            // Render LOs
            LOs.forEach((lo, idx) => {
                // Create sidebar nav item
                const navItem = document.createElement('a');
                navItem.className = `sidebar-nav-item ${state.expandedLOs.includes(lo.id) ? 'active' : ''}`;
                navItem.href = `#${lo.id}`;
                navItem.textContent = `LO ${idx + 1}`;
                navItem.onclick = (e) => {
                    e.preventDefault();
                    const el = document.getElementById(lo.id);
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
                sidebarNav.appendChild(navItem);

                // Create LO section
                const section = document.createElement('div');
                section.id = lo.id;
                section.className = `lo-section ${state.expandedLOs.includes(lo.id) ? 'active' : ''}`;

                const header = document.createElement('div');
                header.className = 'lo-header';
                header.innerHTML = `
                    <span class="lo-title">${lo.title}</span>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <input type="checkbox" class="lo-checkbox" ${state.completedLOs.includes(lo.id) ? 'checked' : ''}>
                        <span class="lo-toggle">▼</span>
                    </div>
                `;

                header.onclick = () => {
                    section.classList.toggle('active');
                    const isActive = section.classList.contains('active');
                    navItem.classList.toggle('active', isActive);
                    updateExpandedState(lo.id, isActive);
                    updateProgress();
                };

                const checkbox = header.querySelector('.lo-checkbox');
                checkbox.onclick = (e) => {
                    e.stopPropagation();
                    updateCheckedState(lo.id, checkbox.checked);
                    updateProgress();
                };

                const content = document.createElement('div');
                content.className = 'lo-content';
                content.innerHTML = lo.content;

                section.appendChild(header);
                section.appendChild(content);
                container.appendChild(section);
            });

            // Setup scroll listener
            setupScrollListener();
            updateProgress();
        }

        function updateExpandedState(loId, isActive) {
            const state = loadState();
            if (isActive && !state.expandedLOs.includes(loId)) {
                state.expandedLOs.push(loId);
            } else if (!isActive && state.expandedLOs.includes(loId)) {
                state.expandedLOs = state.expandedLOs.filter(id => id !== loId);
            }
            saveState(state);
        }

        function updateCheckedState(loId, isChecked) {
            const state = loadState();
            if (isChecked && !state.completedLOs.includes(loId)) {
                state.completedLOs.push(loId);
            } else if (!isChecked && state.completedLOs.includes(loId)) {
                state.completedLOs = state.completedLOs.filter(id => id !== loId);
            }
            saveState(state);
        }

        function setupScrollListener() {
            const main = document.querySelector('.main');
            main.addEventListener('scroll', () => {
                updateActiveNavItem();
            });
        }

        function updateActiveNavItem() {
            const sections = document.querySelectorAll('.lo-section');
            const navItems = document.querySelectorAll('.sidebar-nav-item');
            const scrollPos = document.querySelector('.main').scrollTop + 150;

            let currentSection = null;
            sections.forEach(section => {
                if (section.offsetTop <= scrollPos) {
                    currentSection = section.id;
                }
            });

            navItems.forEach((item, idx) => {
                item.classList.remove('active');
                if (LOs[idx].id === currentSection) {
                    item.classList.add('active');
                }
            });
        }

        function updateProgress() {
            const state = loadState();
            const total = LOs.length;
            const completed = state.completedLOs.length;
            const percentage = Math.round((completed / total) * 100);

            document.getElementById('progress-fill').style.width = `${percentage}%`;
            document.getElementById('progress-pct').textContent = percentage;
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', initializeUI);
    </script>
</body>
</html>
