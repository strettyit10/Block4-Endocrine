                        q: 'A 58-year-old woman with pneumonia develops SIADH and hyponatremia (Na 118) with altered mental status. You give 3% hypertonic saline. After 12 hours, her Na is 132. What is your next action?',
                        options: ['Continue 3% saline at same rate', 'Slow or stop saline; give free water or desmopressin', 'Increase saline rate', 'Switch to 0.9% normal saline', 'Perform hysterectomy'],
                        correct: 1,
                        explain: 'You corrected Na by 14 mEq/L in 12 hours (exceeds safe rate of 8-12 mEq/L per 24h). Risk of osmotic demyelination syndrome (ODS/CPM) if you continue. STOP correction; give free water or desmopressin to re-lower Na slightly.'
                    },
                    {
                        q: 'A patient with SIADH refractory to fluid restriction is started on tolvaptan. After 48 hours, serum Na is 134 (was 124). LFTs are normal. Which of the following is true?',
                        options: ['Tolvaptan is ineffective; switch to conivaptan', 'Continue tolvaptan; monitor Na correction rate (should be 8-12 mEq/L per 24h)', 'Tolvaptan is contraindicated if Na >130', 'Increase tolvaptan dose to speed Na normalization', 'Tolvaptan causes liver toxicity; discontinue immediately'],
                        correct: 1,
                        explain: 'Tolvaptan is working (Na rising 10 mEq/L per 24h — within safe range). Free water excretion (aquaresis) explains Na rise. Continue therapy; monitor Na q6-12h during correction phase; continue LFT monitoring.'
                    }
                ],
                'lo6': [
                    {
                        q: 'A 52-year-old man undergoes transsphenoidal surgery for a non-functioning pituitary adenoma. Post-operative hormonal testing confirms cortisol deficiency, TSH/free T4 low, and low testosterone. You are starting replacement. What is your first medication?',
                        options: ['Levothyroxine 100 mcg daily', 'Testosterone replacement', 'Hydrocortisone 15-20 mg/day', 'GH injection', 'DDAVP nasal spray'],
                        correct: 2,
                        explain: 'ALWAYS start cortisol FIRST (hydrocortisone 15-20 mg/day divided doses). Starting levothyroxine without cortisol replacement in secondary adrenal insufficiency can precipitate adrenal crisis.'
                    },
                    {
                        q: 'A 48-year-old woman with hypopituitarism is on hydrocortisone 15 mg/day, levothyroxine 100 mcg/day, and estrogen/progesterone. She's scheduled for major surgery next week. What adjustment to her hydrocortisone is appropriate?',
                        options: ['No change needed', 'Double dose day of surgery', 'Triple dose day of surgery', 'Start IV hydrocortisone 100 mg q6-8h perioperatively', 'Hold hydrocortisone day of surgery to prevent oversuppression'],
                        correct: 3,
                        explain: 'Major surgery = physiologic stress. All hypopituitary patients on glucocorticoids need stress dosing: IV hydrocortisone 100 mg q6-8h perioperatively, then taper back to maintenance over 24-48 hrs post-op. This prevents adrenal crisis.'
                    },
                    {
                        q: 'A patient with secondary hypothyroidism (pituitary insufficiency) on levothyroxine replacement. Which lab is most helpful to assess adequacy of thyroid replacement?',
                        options: ['TSH', 'Free T4', 'Total T3', 'T3 resin uptake', 'Thyroid antibodies'],
                        correct: 1,
                        explain: 'In secondary hypothyroidism, the pituitary is damaged, so TSH is unreliable (cannot respond to low free T4). Monitor FREE T4, targeting the upper-normal range (to compensate for lost TSH stimulation).'
                    }
                ],
                'lo7': [
                    {
                        q: 'A 35-year-old man with Kallmann syndrome (congenital GnRH deficiency) desires fertility. Which GnRH therapy is most appropriate?',
                        options: ['Leuprolide 7.5 mg IM monthly', 'Goserelin 3.6 mg SC monthly', 'Pulsatile GnRH via pump', 'Bicalutamide monotherapy', 'Testosterone gel'],
                        correct: 2,
                        explain: 'Kallmann syndrome requires pulsatile GnRH (via portable pump, SC injection q60-90 min) to restore normal GnRH physiology and trigger LH/FSH → spermatogenesis and fertility. Continuous agonists would suppress fertility.'
                    },
                    {
                        q: 'A 68-year-old man with metastatic prostate cancer is started on leuprolide (GnRH agonist). His PSA is 120 ng/mL and he has known spinal metastases. You also prescribe bicalutamide. Why is the antiandrogen critical here?',
                        options: ['Bicalutamide cures prostate cancer faster', 'Bicalutamide prevents the testosterone flare → avoids spinal cord compression risk', 'Bicalutamide improves bone marrow function', 'Bicalutamide reduces side effects of hot flashes', 'Bicalutamide is required by protocol; no other reason'],
                        correct: 1,
                        explain: 'GnRH agonist has 1-2 week flare where testosterone rises transiently. In patients with bone mets, this can worsen pain or cause spinal cord compression (emergency). Antiandrogen (bicalutamide) 3-7 days before agonist covers flare, preventing this complication.'
                    },
                    {
                        q: 'A 42-year-old woman with endometriosis is started on leuprolide 3.75 mg IM monthly. After 1 month, she reports worsening pelvic pain and dysmenorrhea. What is the most likely explanation?',
                        options: ['Leuprolide is not working; switch to GnRH antagonist', 'This is the GnRH agonist flare (transient ↑ estrogen); pain should improve after 2-4 weeks', 'Leuprolide causes endometriosis progression', 'Patient has undiagnosed pelvic inflammatory disease', 'Wrong indication for leuprolide'],
                        correct: 1,
                        explain: 'First 1-2 weeks of continuous GnRH agonist: transient ↑ estrogen/LH/FSH from initial receptor stimulation → worsening endo pain before downregulation occurs. Reassure patient; pain typically improves after 2-4 weeks as suppression takes effect.'
                    }
                ]
            };

            return (mcqs[loId] || []).map((mcq, idx) => `
                <div class="mcq">
                    <div class="mcq-question">${idx + 1}. ${mcq.q}</div>
                    <div class="mcq-options">
                        ${mcq.options.map((opt, optIdx) => `
                            <label class="mcq-option" style="cursor: pointer;">
                                <input type="radio" name="mcq-${loId}-${idx}" value="${optIdx}" style="cursor: pointer;">
                                ${opt}
                            </label>
                        `).join('')}
                    </div>
                    <button class="reveal-btn" onclick="revealAnswer(event, ${loId.slice(-1)}, ${idx}, ${mcq.correct})">Reveal Answer</button>
                    <div class="explanation" id="explain-${loId}-${idx}">
                        <strong>Correct Answer:</strong> ${mcq.options[mcq.correct]}<br><br>
                        <strong>Explanation:</strong> ${mcq.explain}
                    </div>
                </div>
            `).join('');
        }

        window.revealAnswer = function(event, loNum, qNum, correct) {
            event.preventDefault();
            const loId = 'lo' + loNum;
            const explain = document.getElementById(`explain-${loId}-${qNum}`);
            explain.classList.toggle('visible');

            const radios = document.querySelectorAll(`input[name="mcq-${loId}-${qNum}"]`);
            radios.forEach((radio, idx) => {
                const label = radio.parentElement;
                if (idx === correct) {
                    label.classList.add('correct');
                } else if (radio.checked) {
                    label.classList.add('incorrect');
                }
            });
        };

        function attachEventListeners() {
            // Flip cards
            document.querySelectorAll('.flip-card').forEach(card => {
                card.addEventListener('click', function() {
                    this.classList.toggle('flipped');
                    const content = this.querySelector('.flip-card-content');
                    if (this.classList.contains('flipped')) {
                        content.textContent = this.dataset.back;
                    } else {
                        content.textContent = this.dataset.front;
                    }
                });
            });

            // Checkboxes
            document.querySelectorAll('.lo-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    saveProgress();
                    updateProgress();
                });
            });

            // Sidebar navigation
            document.querySelectorAll('.sidebar-nav a').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const loId = this.dataset.loId;
                    const section = document.getElementById(loId);
                    section.scrollIntoView({ behavior: 'smooth' });
                });
            });
        }

        function attachScrollListener() {
            window.addEventListener('scroll', () => {
                lectureData.los.forEach(lo => {
                    const section = document.getElementById(lo.id);
                    const rect = section.getBoundingClientRect();
                    const navLink = document.querySelector(`[data-lo-id="${lo.id}"]`);
                    if (rect.top < 150 && rect.bottom > 150) {
                        document.querySelectorAll('.sidebar-nav a').forEach(l => l.classList.remove('active'));
                        navLink.classList.add('active');
                    }
                });
            });
        }

        function saveProgress() {
            const progress = {};
            document.querySelectorAll('.lo-checkbox').forEach(checkbox => {
                progress[checkbox.dataset.loId] = checkbox.checked;
            });
            localStorage.setItem('endo_lec08', JSON.stringify(progress));
        }

        function loadProgress() {
            const progress = JSON.parse(localStorage.getItem('endo_lec08') || '{}');
            Object.keys(progress).forEach(loId => {
                const checkbox = document.querySelector(`[data-lo-id="${loId}"]`);
                if (checkbox) checkbox.checked = progress[loId];
            });
        }

        function updateProgress() {
            const total = lectureData.los.length;
            const completed = document.querySelectorAll('.lo-checkbox:checked').length;
            const percent = Math.round((completed / total) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
        }
    </script>
</body>
</html>
